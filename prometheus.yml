global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-thinkcentre'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - target_label: instance
        replacement: 'thinkcentre'

  - job_name: 'node-nuc'
    static_configs:
      - targets: ['192.168.1.7:9100']
    relabel_configs:
      - target_label: instance
        replacement: 'nuc'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'plex'
    static_configs:
      - targets: ['plex-exporter:8000']
